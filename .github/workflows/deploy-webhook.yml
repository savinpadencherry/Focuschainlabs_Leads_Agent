name: Deploy WhatsApp webhook to Cloud Run

# Builds the webhook image from the root Dockerfile, pushes it to Artifact
# Registry, and deploys it to the existing crm-webhook Cloud Run service.
# Auth uses Workload Identity Federation — no long-lived key in GitHub.
# One-time GCP setup required before this can run; see repo chat/PR notes.

on:
  push:
    branches: [main]
    paths:
      - "whatsapp_webhook.py"
      - "utils/**"
      - "agent/**"
      - "requirements-webhook.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-webhook.yml"
  workflow_dispatch: {}

env:
  REGION: asia-south1
  SERVICE: crm-webhook
  REPOSITORY: focuschain
  IMAGE_NAME: webhook

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format "value(status.url)"
