name: Deploy CRM app to Cloud Run

# Builds the Streamlit app image from Dockerfile.streamlit, pushes it to Artifact
# Registry, and deploys the shared multi-tenant crm-app Cloud Run service.
# Auth uses Workload Identity Federation — no long-lived key in GitHub.
# Runtime secrets (API keys, [auth], DB) are configured on the service itself,
# not here. Existing Cloud SQL attachments, secret mounts and environment values
# are preserved when only the image is updated.

on:
  push:
    branches: [main]
    paths:
      - "streamlit_app.py"
      - "*_ui.py"
      - "utils/**"
      - "agent/**"
      - "config/**"
      - "requirements.txt"
      - "requirements-webhook.txt"
      - "tests/**"
      - "Dockerfile.streamlit"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch: {}

env:
  REGION: asia-south1
  SERVICE: crm-app
  REPOSITORY: focuschain
  IMAGE_NAME: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-webhook.txt

      - name: Run auth and tenant-isolation regression tests
        run: |
          set -euo pipefail
          for pattern in \
            test_auth.py \
            test_auth_login_ui.py \
            test_org_config.py \
            test_whatsapp_hardening.py \
            test_whatsapp_webhook.py \
            test_multitenant_outbound_hardening.py \
            test_secure_webhook_entrypoint.py
          do
            python -m unittest discover -s tests -p "$pattern"
          done

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -f Dockerfile.streamlit -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --no-invoker-iam-check \
            --labels app=focuschain-crm,component=app,env=prod,tenant-model=shared,managed-by=github-actions \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format "value(status.url)"
