name: Deploy CRM app to Cloud Run

# Builds the Streamlit app image from Dockerfile.streamlit, pushes it to Artifact
# Registry, and deploys the shared multi-tenant crm-app Cloud Run service.
# Auth uses Workload Identity Federation — no long-lived key in GitHub.
# Runtime secrets (API keys, [auth], DB) are configured on the service itself,
# not here. One-time GCP setup is documented in the architecture PDF / docs.

on:
  push:
    branches: [main]
    paths:
      - "streamlit_app.py"
      - "*_ui.py"
      - "utils/**"
      - "agent/**"
      - "config/**"
      - "requirements.txt"
      - "Dockerfile.streamlit"
      - ".github/workflows/deploy-app.yml"
  workflow_dispatch: {}

env:
  REGION: asia-south1
  SERVICE: crm-app
  REPOSITORY: focuschain
  IMAGE_NAME: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -f Dockerfile.streamlit -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "$IMAGE_URI" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --allow-unauthenticated \
            --labels app=focuschain-crm,component=app,env=prod,tenant-model=shared,managed-by=github-actions \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region "${{ env.REGION }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --format "value(status.url)"
