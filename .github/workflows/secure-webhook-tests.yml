name: Secure webhook entrypoint test

on:
  pull_request:
    branches: [main]
    paths:
      - "secure_webhook_app.py"
      - "utils/webhook_security.py"
      - "tests/test_secure_webhook_entrypoint.py"
      - "Dockerfile"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install webhook dependencies
        run: python -m pip install -r requirements-webhook.txt
      - name: Test fail-closed webhook entrypoint
        run: python -m unittest discover -s tests -p "test_secure_webhook_entrypoint.py"
