# Copy these keys into Streamlit Cloud's app Secrets panel.
# Do not commit real API keys.

# ── Authentication (Google sign-in) ───────────────────────────────────────────
# Native Streamlit OIDC. When this [auth] section is present, the app shows a
# Google sign-in screen and resolves each user's organization from their email
# domain (see ORG_CONFIG / ORG_EMAIL_DOMAINS below). Omit it entirely for local
# dev — the app then runs unauthenticated in single-tenant "dev mode".
#
#   1. Google Cloud Console → APIs & Services → Credentials → Create OAuth client
#      ID → Web application. Authorized redirect URI = "<your-app-url>/oauth2callback".
#   2. cookie_secret = any long random string (e.g. `python -c "import secrets;print(secrets.token_hex(32))"`).
#
# [auth]
# redirect_uri = "https://your-app.example.com/oauth2callback"
# cookie_secret = "replace-with-a-long-random-string"
# [auth.google]
# client_id = "xxxxx.apps.googleusercontent.com"
# client_secret = "your-oauth-client-secret"
# server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# ── Organizations / tenants ───────────────────────────────────────────────────
# Which companies use the app and which email domains map to which tenant. The
# built-in defaults already cover focuschainlabs + sn_realtors; override here
# once you confirm the real Google Workspace domains. (See utils/org_config.py.)
#
# ORG_CONFIG = '''[
#   {"id":"focuschainlabs","name":"FocusChain Labs","short_name":"FocusChain",
#    "email_domains":["focuschainlabs.com"],
#    "tagline":"prompt.intake() -> signals.scan -> outreach.deploy",
#    "eyebrow":"FOCUSCHAIN LABS · LEAD AGENT"},
#   {"id":"sn_realtors","name":"SN Realtors","short_name":"SN Realtors",
#    "email_domains":["snrealtors.in"],
#    "tagline":"premium homes -> matched buyers -> closed deals",
#    "eyebrow":"SN REALTORS · LEAD DESK"}
# ]'''
#
# Quick domain-only override (wins over ORG_CONFIG email_domains):
# ORG_EMAIL_DOMAINS = '{"focuschainlabs.com":"focuschainlabs","snrealtors.in":"sn_realtors"}'
#
# Local dev helpers (ignored in production):
# AUTH_DISABLED = "true"        # force unauthenticated single-tenant mode
# DEV_ORG_ID = "sn_realtors"    # which tenant dev mode lands in (default: first org)


# FocusChain LLM — primary engine. Get a key at platform.deepseek.com
# (prepaid credits, roughly ₹25 per million tokens — very cheap).
DEEPSEEK_API_KEY = "sk-your_deepseek_key"
DEEPSEEK_MODEL = "deepseek-chat"

# Fallback engine — used automatically when the primary key is absent or a
# call fails. Keeps the app alive on Google's free tier.
GEMINI_API_KEY = "your_google_ai_studio_key"
# GOOGLE_API_KEY also works as an alias if you prefer that name.
GEMINI_MODEL = "gemini-2.5-flash"

# Per-run ceiling on LLM calls, any engine (replaces GEMINI_BUDGET).
LLM_BUDGET = "80"

SERPER_API_KEY = "your_serper_key"

# Apify — primary contact enrichment while Apollo is unavailable ($5 free/month)
# Actors used: decision-maker-extractor, linkedin-employees, contact-info-scraper
APIFY_API_KEY = "your_apify_api_token"

# Optional — add later when budget/credits are available
APOLLO_API_KEY = ""

# Optional — email finder/verifier (free 25/mo at hunter.io)
HUNTER_API_KEY = ""

# Optional — LinkedIn/job data if ProxyCurl is enabled
PROXYCURL_API_KEY = ""

# Optional — startup funding data
TRACXN_API_KEY = ""

# Agent behaviour
PILOT_MODE = "true"
MAX_LEADS_PER_RUN = "30"
MIN_SCORE_THRESHOLD = "60"
CONTACT_ENRICH_CAP = "30"

# Run-size guards — keep these tight on Streamlit Cloud's free tier to avoid the
# host killing long runs (OOM / time limit). Each researched company makes ~10
# web lookups, so these directly control runtime and memory.
RESEARCH_FANOUT = "2"      # research up to max_leads * this many companies
RESEARCH_HARD_CAP = "12"   # absolute ceiling on companies researched per run

# Reach Agent — Gmail SMTP for direct sending ─────────────────────────────────
# Generate an App Password (NOT your account password):
#   Google Account → Security → 2-Step Verification → App Passwords → Create
SMTP_FROM_EMAIL   = "you@gmail.com"
SMTP_APP_PASSWORD = "xxxx xxxx xxxx xxxx"

# Your details for AI-composed email signatures
SENDER_NAME     = "Your Name"
SENDER_TITLE    = "Your Title"
SENDER_COMPANY  = "FocusChain Labs"
SENDER_OFFERING = "We help B2B companies automate lead generation and outreach using AI agents."

# Finance Agent — invoicing defaults ──────────────────────────────────────────
INVOICE_PREFIX   = "INV"        # invoice numbers become INV-2026-001, INV-2026-002 …
INVOICE_TAX_RATE = "18"         # default GST/tax % pre-filled on new invoices (0 = none)
# Shown in the "Payment Instructions" box on every invoice (bank/UPI details).
PAYMENT_INSTRUCTIONS = "Bank: Your Bank · A/C: 0000000000 · IFSC: XXXX0000000 · UPI: you@upi"

# CRM — Supabase-backed contact storage (PRIMARY backend).
# When SUPABASE_URL + SUPABASE_KEY are set, the CRM reads/writes Supabase and,
# on first connect, auto-migrates the existing data/crm/contacts.json leads.
# One-time setup: run db/schema.sql in the Supabase SQL editor to create tables.
# Use the SERVICE-ROLE key (Project Settings → API) so server-side writes
# bypass Row Level Security.
SUPABASE_URL = "https://your-ref.supabase.co"
SUPABASE_KEY = "your-service-role-key"

# CRM — GitHub-backed storage (fallback, used only when SUPABASE_* is unset).
# Create a classic PAT at github.com/settings/tokens with "repo" scope.
GITHUB_TOKEN = "ghp_your_token_here"
GITHUB_REPO = "savinpadencherry/Focuschainlabs_Leads_Agent"
GITHUB_BRANCH = "main"
CRM_DATA_PATH = "data/crm/contacts.json"

# Multi-tenant — optional. Leave CRM_ORGS unset for single-tenant (today's
# default: one shared GitHub-backed CRM). To run several client orgs, each
# with its own isolated database, define them here:
#
# CRM_ORGS = '''[
#   {"id": "focuschainlabs", "label": "FocusChain Labs", "backend": "github"},
#   {"id": "sn_realtors",    "label": "SN Realtors", "backend": "postgres",
#    "database_url_env": "SN_REALTORS_DATABASE_URL"}
# ]'''
# SN_REALTORS_DATABASE_URL = "postgresql://user:pass@host/sn_realtors_db?sslmode=require"
#
# A "postgres" org needs: (1) its own Neon/Cloud SQL database, (2) the schema
# applied — psql "$DATABASE_URL" -f db/schema.sql — and (3) psycopg installed
# — pip install 'psycopg[binary]>=3.1'. See docs/DEPLOYMENT.md for the full guide.

# WhatsApp → CRM (Meta WhatsApp Business Cloud API) ───────────────────────────
# These power the separate webhook service (whatsapp_webhook.py on Cloud Run);
# the Streamlit app itself only needs them if you want to SEND WhatsApp
# messages from the UI later. Setup guide: docs/DEPLOYMENT.md §WhatsApp.
WHATSAPP_ACCESS_TOKEN   = "EAAG_your_meta_system_user_token"
WHATSAPP_PHONE_NUMBER_ID = "123456789012345"
WHATSAPP_VERIFY_TOKEN   = "any-random-string-you-choose"
# WHATSAPP_ORG_ID       = "sn_realtors"   # which CRM_ORGS tenant this number feeds
# WHATSAPP_SEND_ACK     = "true"          # auto-reply a short confirmation
