# Copy these keys into Streamlit Cloud's app Secrets panel.
# Do not commit real API keys.

GEMINI_API_KEY = "your_google_ai_studio_key"
# GOOGLE_API_KEY also works as an alias if you prefer that name.

SERPER_API_KEY = "your_serper_key"
APOLLO_API_KEY = "your_apollo_key"

# Apify — primary fallback when Apollo credits run out ($5 free/month)
# Actors used: decision-maker-extractor, linkedin-employees, contact-info-scraper
APIFY_API_KEY = "your_apify_api_token"

# Optional — email finder/verifier (free 25/mo at hunter.io)
HUNTER_API_KEY = ""

PROXYCURL_API_KEY = "your_proxycurl_key"

# Optional
TRACXN_API_KEY = ""

# Agent behaviour
PILOT_MODE = "true"
MAX_LEADS_PER_RUN = "30"
MIN_SCORE_THRESHOLD = "60"
APOLLO_ENRICH_CAP = "30"
