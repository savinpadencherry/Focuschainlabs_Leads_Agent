# Copy these keys into Streamlit Cloud's app Secrets panel.
# Do not commit real API keys.

GEMINI_API_KEY = "your_google_ai_studio_key"
# GOOGLE_API_KEY also works as an alias if you prefer that name.
GEMINI_MODEL = "gemini-2.5-flash"

SERPER_API_KEY = "your_serper_key"

# Apify — primary contact enrichment while Apollo is unavailable ($5 free/month)
# Actors used: decision-maker-extractor, linkedin-employees, contact-info-scraper
APIFY_API_KEY = "your_apify_api_token"

# Optional — add later when budget/credits are available
APOLLO_API_KEY = ""

# Optional — email finder/verifier (free 25/mo at hunter.io)
HUNTER_API_KEY = ""

# Optional — startup funding data
TRACXN_API_KEY = ""

# Agent behaviour
PILOT_MODE = "true"
MAX_LEADS_PER_RUN = "30"
MIN_SCORE_THRESHOLD = "55"
CONTACT_ENRICH_CAP = "30"

# Run-size guards — keep these tight on Streamlit Cloud's free tier to avoid the
# host killing long runs (OOM / time limit). Each researched company makes ~8
# web lookups, so these directly control runtime and memory.
RESEARCH_FANOUT = "2"      # research up to max_leads * this many companies
RESEARCH_HARD_CAP = "12"   # absolute ceiling on companies researched per run

# Per-run API budget ceilings — a HARD cap on how many calls a single run may
# make to each paid API. Makes overspend structurally impossible: once a cap is
# hit, that service degrades gracefully (returns empty / falls back) and the run
# still finishes. Lower these to force a cheaper run; raise them for deeper runs.
#   A full-quality Scout run uses ~160 Serper + ~25 Gemini calls.
SERPER_BUDGET = "200"      # max Serper (Google/news) calls per run
GEMINI_BUDGET = "80"       # max Gemini Flash calls per run
HUNTER_BUDGET = "20"       # max Hunter.io email lookups per run (free tier: 25/mo)
APOLLO_BUDGET = "40"       # max Apollo people-search calls per run
APIFY_BUDGET  = "25"       # max Apify actor runs per run

# Reach Agent — Gmail SMTP for direct sending ─────────────────────────────────
# Generate an App Password (NOT your account password):
#   Google Account → Security → 2-Step Verification → App Passwords → Create
SMTP_FROM_EMAIL   = "you@gmail.com"
SMTP_APP_PASSWORD = "xxxx xxxx xxxx xxxx"

# Your details for AI-composed email signatures
SENDER_NAME     = "Your Name"
SENDER_TITLE    = "Your Title"
SENDER_COMPANY  = "FocusChain Labs"
SENDER_OFFERING = "We help B2B companies automate lead generation and outreach using AI agents."

# CRM — GitHub-backed contact storage (required on Streamlit Cloud)
# Create a classic PAT at github.com/settings/tokens with "repo" scope.
GITHUB_TOKEN = "ghp_your_token_here"
GITHUB_REPO = "savinpadencherry/Focuschainlabs_Leads_Agent"
GITHUB_BRANCH = "main"
CRM_DATA_PATH = "data/crm/contacts.json"
