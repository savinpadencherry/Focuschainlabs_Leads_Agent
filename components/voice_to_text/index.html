<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 2px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: transparent;
  }
  #wrap { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  button {
    border: 1px solid rgba(15,42,51,.18);
    background: #EFE9DC;
    color: #0F2A33;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13.5px;
    font-weight: 700;
    letter-spacing: .02em;
    cursor: pointer;
    transition: background .15s ease, color .15s ease, border-color .15s ease, transform .1s ease;
  }
  button:hover:not(:disabled) { transform: translateY(-1px); }
  button.listening {
    background: #2E8B4D;
    color: #fff;
    border-color: #2E8B4D;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  #status {
    font-size: 12.5px;
    color: #6B7F85;
    line-height: 1.4;
    flex: 1 1 240px;
    min-width: 0;
  }
</style>
</head>
<body>
<div id="wrap">
  <button id="micBtn" type="button">Start dictation</button>
  <span id="status">Uses your browser's built-in speech recognition — runs locally, free, nothing goes through our AI.</span>
</div>
<script>
function send(type, data) {
  window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data || {}), "*");
}
function reportHeight() {
  send("streamlit:setFrameHeight", { height: document.documentElement.scrollHeight });
}
send("streamlit:componentReady", { apiVersion: 1 });
reportHeight();
window.addEventListener("message", function (event) {
  if (event.data && event.data.type === "streamlit:render") { reportHeight(); }
});

var btn = document.getElementById("micBtn");
var status = document.getElementById("status");
var defaultStatus = status.textContent;
var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (!SpeechRecognition) {
  btn.disabled = true;
  status.textContent = "Your browser doesn't support built-in dictation (try Chrome or Edge) — just type the details below.";
} else {
  var recog = new SpeechRecognition();
  recog.continuous = true;
  recog.interimResults = true;
  recog.lang = "en-IN";

  var listening = false;
  var stoppedByUser = false;
  var finalText = "";

  recog.onresult = function (event) {
    var interim = "";
    for (var i = event.resultIndex; i < event.results.length; i++) {
      var piece = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += piece + " ";
      } else {
        interim += piece;
      }
    }
    status.textContent = "Listening… " + (finalText + interim).trim();
    reportHeight();
  };
  recog.onerror = function (event) {
    if (event.error === "no-speech") { return; }
    status.textContent = "Mic error (" + event.error + ") — try again, or type the details below.";
  };
  recog.onend = function () {
    if (listening && !stoppedByUser) {
      recog.start();
      return;
    }
    listening = false;
    btn.classList.remove("listening");
    btn.textContent = "Start dictation";
    var captured = finalText.trim();
    status.textContent = captured ? "Captured — it's in the text box below. Edit freely." : defaultStatus;
    if (captured) { send("streamlit:setComponentValue", { value: captured }); }
    reportHeight();
  };

  btn.addEventListener("click", function () {
    if (listening) {
      stoppedByUser = true;
      recog.stop();
    } else {
      finalText = "";
      stoppedByUser = false;
      listening = true;
      btn.classList.add("listening");
      btn.textContent = "Stop dictation";
      status.textContent = "Listening…";
      recog.start();
    }
  });
}
</script>
</body>
</html>
